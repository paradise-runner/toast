name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goarch: arm64
            asset: toast-darwin-arm64
          - runner: macos-14
            goarch: amd64
            asset: toast-darwin-amd64
          - runner: ubuntu-latest
            goarch: amd64
            asset: toast-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.asset }} ./cmd/toast

      - name: Archive (zip)
        run: zip ${{ matrix.asset }}.zip ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      darwin_arm64_sha: ${{ steps.sha.outputs.darwin_arm64 }}
      darwin_amd64_sha: ${{ steps.sha.outputs.darwin_amd64 }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum toast-darwin-arm64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum toast-darwin-amd64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.zip"

  homebrew:
    name: Update homebrew tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: paradise-runner/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        env:
          VERSION: ${{ github.ref_name }}
          ARM64_SHA: ${{ needs.release.outputs.darwin_arm64_sha }}
          AMD64_SHA: ${{ needs.release.outputs.darwin_amd64_sha }}
        run: |
          cat > homebrew-tap/toast.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # DO NOT EDIT. Generated by release workflow.
          class Toast < Formula
            desc "In-terminal IDE for quick file edits"
            homepage "https://github.com/paradise-runner/toast"
            version "${VERSION#v}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/paradise-runner/toast/releases/download/${VERSION}/toast-darwin-arm64.zip"
                sha256 "${ARM64_SHA}"

                def install
                  bin.install "toast-darwin-arm64" => "toast"
                end
              else
                url "https://github.com/paradise-runner/toast/releases/download/${VERSION}/toast-darwin-amd64.zip"
                sha256 "${AMD64_SHA}"

                def install
                  bin.install "toast-darwin-amd64" => "toast"
                end
              end
            end

          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toast.rb
          git diff --cached --quiet || git commit -m "toast ${GITHUB_REF_NAME}"
          git push
